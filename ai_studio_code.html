<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermi Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div x-data="fermiApp()" class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-indigo-700">Fermi Estimator</h1>
        
        <!-- Problem Input -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">What are you calculating?</label>
            <input type="text" x-model="problem" placeholder="e.g., How many piano tuners in Chicago?" 
                   class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Variables List -->
        <div class="space-y-3">
            <template x-for="(v, index) in variables" :key="index">
                <div class="grid grid-cols-4 gap-2 items-center p-3 bg-gray-50 rounded-lg border">
                    <input x-model="v.name" placeholder="Variable" class="col-span-1 p-1 border rounded text-sm">
                    <input type="number" x-model.number="v.min" placeholder="Min" class="col-span-1 p-1 border rounded text-sm">
                    <input type="number" x-model.number="v.estimate" placeholder="Best" class="col-span-1 p-1 border rounded text-sm">
                    <input type="number" x-model.number="v.max" placeholder="Max" class="col-span-1 p-1 border rounded text-sm">
                    <button @click="removeVariable(index)" class="text-red-500 text-xs">Remove</button>
                </div>
            </template>
        </div>

        <button @click="addVariable()" class="mt-4 w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
            + Add Variable
        </button>

        <!-- Results -->
        <div class="mt-8 p-4 bg-indigo-50 rounded-lg">
            <h2 class="text-lg font-semibold text-indigo-900">Estimation Result</h2>
            <div class="grid grid-cols-3 gap-4 mt-4 text-center">
                <div>
                    <p class="text-xs text-gray-500">Lower Bound</p>
                    <p class="text-xl font-bold text-red-600" x-text="format(results.min)"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-500">Estimate</p>
                    <p class="text-2xl font-bold text-indigo-800" x-text="format(results.best)"></p>
                </div>
                <div>
                    <p class="text-xs text-gray-500">Upper Bound</p>
                    <p class="text-xl font-bold text-green-600" x-text="format(results.max)"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fermiApp() {
            return {
                problem: '',
                variables:[{ name: 'Step 1', min: 1, estimate: 1, max: 1 }],
                
                addVariable() {
                    this.variables.push({ name: '', min: 1, estimate: 1, max: 1 });
                },
                
                removeVariable(index) {
                    this.variables.splice(index, 1);
                },

                get results() {
                    return this.variables.reduce((acc, v) => ({
                        min: acc.min * (parseFloat(v.min) || 0),
                        best: acc.best * (parseFloat(v.estimate) || 0),
                        max: acc.max * (parseFloat(v.max) || 0)
                    }), { min: 1, best: 1, max: 1 });
                },

                format(num) {
                    if (num > 1000000) return (num / 1000000).toFixed(1) + 'M';
                    if (num > 1000) return (num / 1000).toFixed(1) + 'K';
                    return Math.round(num).toLocaleString();
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fermi Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div x-data="fermiApp()" x-init="init()" class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-indigo-700">Fermi Estimator</h1>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">What are you estimating?</label>
            <input type="text" x-model="problem" @input="save()" placeholder="e.g., Daily pizza consumption in NYC" 
                   class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Labels -->
        <div class="grid grid-cols-12 gap-2 text-[10px] uppercase font-bold text-gray-400 mb-2 px-1">
            <div class="col-span-4">Variable</div>
            <div class="col-span-2 text-center">Lower</div>
            <div class="col-span-2 text-center">Best</div>
            <div class="col-span-2 text-center">Upper</div>
            <div class="col-span-2 text-center">Scale</div>
        </div>

        <!-- Variables List -->
        <div class="space-y-3">
            <template x-for="(v, index) in variables" :key="index">
                <div class="grid grid-cols-12 gap-2 items-center p-2 bg-gray-50 rounded-lg border">
                    <input x-model="v.name" @input="save()" class="col-span-4 p-1 border rounded text-xs" placeholder="Step name">
                    <input type="number" x-model.number="v.min" @input="save()" class="col-span-2 p-1 border rounded text-xs text-center">
                    <input type="number" x-model.number="v.estimate" @input="save()" class="col-span-2 p-1 border rounded text-xs text-center">
                    <input type="number" x-model.number="v.max" @input="save()" class="col-span-2 p-1 border rounded text-xs text-center">
                    <select x-model.number="v.multiplier" @change="save()" class="col-span-2 p-1 border rounded text-xs">
                        <option value="1">x1</option>
                        <option value="1000">K (1k)</option>
                        <option value="1000000">M (1M)</option>
                    </select>
                    <button @click="removeVariable(index)" class="hidden">x</button>
                </div>
            </template>
        </div>

        <button @click="addVariable()" class="mt-4 w-full border-2 border-dashed border-indigo-200 text-indigo-600 py-2 rounded-lg hover:bg-indigo-50 transition">
            + Add Step
        </button>

        <!-- Results -->
        <div class="mt-8 p-4 bg-indigo-50 rounded-lg">
            <h2 class="text-sm font-semibold text-indigo-900 mb-4">Calculation Results</h2>
            
            <!-- Visualization -->
            <div class="relative w-full h-4 bg-gray-200 rounded-full overflow-hidden mb-6">
                <div class="absolute h-full bg-red-400 opacity-50" :style="`left: 0; width: ${getBarPercent(results.min)}%`"></div>
                <div class="absolute h-full bg-indigo-600" :style="`left: ${getBarPercent(results.min)}%; width: ${getBarPercent(results.max) - getBarPercent(results.min)}%`"></div>
                <div class="absolute h-full bg-green-500 w-1" :style="`left: ${getBarPercent(results.best)}%`"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase">Lower Bound</p>
                    <p class="text-md font-bold text-red-600" x-text="format(results.min)"></p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase">Best Guess</p>
                    <p class="text-lg font-bold text-indigo-800" x-text="format(results.best)"></p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase">Upper Bound</p>
                    <p class="text-md font-bold text-green-600" x-text="format(results.max)"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fermiApp() {
            return {
                problem: '',
                variables:[{ name: 'Quantity', min: 1, estimate: 1, max: 1, multiplier: 1 }],

                init() {
                    const saved = localStorage.getItem('fermiData');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        this.problem = parsed.problem;
                        this.variables = parsed.variables;
                    }
                },

                save() {
                    localStorage.setItem('fermiData', JSON.stringify({
                        problem: this.problem,
                        variables: this.variables
                    }));
                },

                addVariable() {
                    this.variables.push({ name: '', min: 1, estimate: 1, max: 1, multiplier: 1 });
                    this.save();
                },

                removeVariable(index) {
                    this.variables.splice(index, 1);
                    this.save();
                },

                get results() {
                    return this.variables.reduce((acc, v) => ({
                        min: acc.min * (parseFloat(v.min) * v.multiplier || 0),
                        best: acc.best * (parseFloat(v.estimate) * v.multiplier || 0),
                        max: acc.max * (parseFloat(v.max) * v.multiplier || 0)
                    }), { min: 1, best: 1, max: 1 });
                },

                getBarPercent(val) {
                    const range = this.results.max - this.results.min;
                    if (range === 0) return 50;
                    return Math.min(100, Math.max(0, ((val - this.results.min) / range) * 100));
                },

                format(num) {
                    if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B';
                    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                    return Math.round(num).toLocaleString();
                }
            }
        }
    </script>
</body>
</html>
